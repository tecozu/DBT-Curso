models:
    - name: stg_jaffle_shop__customers
      description: one unique costumer por row
      columns:
        - name: customer_id
          description: the primary key
          data_tests:
            - unique
            - not_null
    - name: stg_jaffle_shop__orders
      description: one unique order per row 
      columns:
        - name: order_id
          description: the primary key
          data_tests:
            - unique
            - not_null
        - name: status
          description: "{{ doc('order_status') }}"
          data_tests:
            - accepted_values: 
                arguments:
                    values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
        - name: customer_id
          description: Foreign key to stg_customers.customer_id
          data_tests:
            - relationships: 
                arguments:
                    to: ref('stg_jaffle_shop__customers')
                    field: customer_id